{% extends "base.html" %}
{% block content %}
<div class="max-w-2xl mx-auto mt-12 px-4">
    <h2 class="text-3xl font-black mb-6">Upload Files</h2>
    
    <form action="/upload" method="post" enctype="multipart/form-data" class="space-y-6 bg-white p-8 rounded-2xl shadow-sm border border-gray-100">
        <div>
            <label class="block text-sm font-bold text-gray-700 mb-2">Select Photos or Videos</label>
            <input type="file" name="files" multiple required
                   class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
        </div>

        <button type="submit" class="w-full bg-blue-600 text-white font-bold py-3 rounded-xl hover-accent transition">
            Start Upload
        </button>
    </form>
</div>
{% endblock %}
