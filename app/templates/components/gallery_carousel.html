<div class="carousel-container relative w-full overflow-hidden">
  <div class="carousel-track flex transition-transform duration-300" 
       style="transform: translateX(-{{ index|default(0) * 100 }}%);">

    {% for item in items %}
      <div class="w-full flex-shrink-0 flex justify-center">
        <img src="{{ item.url }}" class="max-h-[80vh] rounded shadow" />
      </div>
    {% endfor %}
  </div>

  <button class="carousel-prev absolute left-0 top-1/2 -translate-y-1/2 px-4 py-2">‹</button>
  <button class="carousel-next absolute right-0 top-1/2 -translate-y-1/2 px-4 py-2">›</button>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {
  const track = document.querySelector(".carousel-track");
  const prev = document.querySelector(".carousel-prev");
  const next = document.querySelector(".carousel-next");
  const count = track.children.length;
  let index = 0;

  const update = () => {
    track.style.transform = `translateX(-${index * 100}%)`;
  }

  next.onclick = () => { index = (index + 1) % count; update(); }
  prev.onclick = () => { index = (index - 1 + count) % count; update(); }
});
</script>
