{% extends "base.html" %}

{% block content %}
<div class="flex flex-col items-center justify-center min-h-[60vh] px-4">
    <div class="relative">
        <h1 class="text-[10rem] sm:text-[14rem] font-extrabold text-gray-100 leading-none select-none">
            {{ status_code }}
        </h1>
        
        <div class="absolute inset-0 flex flex-col items-center justify-center text-center">
            <h2 class="text-3xl font-bold text-gray-900 mt-8">
                Something's not right.
            </h2>
            <p class="text-gray-600 mt-2 max-w-sm">
                {{ message }}
            </p>
            
            <div class="mt-8">
                <a href="/" class="inline-flex items-center px-6 py-3 border border-transparent text-base font-medium rounded-md shadow-sm text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-all">
                    Return to Dashboard
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
