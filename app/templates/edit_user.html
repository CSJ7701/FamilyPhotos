{% extends "base.html" %}

{% block content %}
<div class="max-w-2xl mx-auto mt-12">
    <nav class="mb-8">
        <a href="/admin" class="text-sm font-bold text-blue-600 hover:text-blue-800 flex items-center gap-2">
            &larr; Back to Dashboard
        </a>
    </nav>

    <div class="bg-white p-8 rounded-2xl shadow-sm border border-gray-100">
        <h2 class="text-2xl font-black text-gray-900 mb-6">Edit Account: {{ user.full_name }}</h2>

        <form action="/admin/edit-user/{{ user.id }}" method="POST" class="space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Full Name</label>
                    <input type="text" name="full_name" value="{{ user.full_name }}" required
                           class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Email Address</label>
                    <input type="email" name="email" value="{{ user.email }}" required
                           class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
            </div>

            <div class="pt-4 space-y-4">
                <label class="flex items-center gap-3 cursor-pointer group">
                    <input type="checkbox" name="is_admin" value="True" {% if user.is_admin %}checked{% endif %}
                           class="w-5 h-5 text-blue-600 border-gray-300 rounded focus:ring-blue-500">
                    <span class="text-sm font-medium text-gray-700 group-hover:text-gray-900">Administrator Privileges</span>
                </label>

                <label class="flex items-center gap-3 cursor-pointer group">
                    <input type="checkbox" name="is_active" value="True" {% if user.is_active %}checked{% endif %}
                           class="w-5 h-5 text-green-600 border-gray-300 rounded focus:ring-green-500">
                    <span class="text-sm font-medium text-gray-700 group-hover:text-gray-900">Account Active (Allows Login)</span>
                </label>
            </div>

            <div class="pt-6 border-t border-gray-50 flex gap-4">
                <button type="submit" class="bg-blue-600 text-white px-8 py-2.5 rounded-xl font-bold hover:bg-blue-700 transition shadow-lg shadow-blue-100">
                    Save Changes
                </button>
                <a href="/admin" class="px-8 py-2.5 text-gray-500 font-bold hover:bg-gray-50 rounded-xl transition">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
