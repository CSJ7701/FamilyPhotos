{% extends "base.html" %}

{% block content %}
<div class="max-w-xl mx-auto mt-16">
    <div class="bg-white p-10 rounded-2xl shadow-xl border border-blue-100">
        <div class="mb-8 text-center">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-600 text-white rounded-2xl rotate-3 mb-4">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 00-2 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                </svg>
            </div>
            <h2 class="text-3xl font-black text-gray-900">System Setup</h2>
            <p class="text-gray-500 mt-2">Create the primary administrator account.</p>
        </div>

        <form action="/initial-setup" method="POST" class="space-y-6">
            <div class="grid grid-cols-1 gap-6">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Admin Full Name</label>
                    <input type="text" name="full_name" required placeholder="e.g. John Smith"
                           class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-4 focus:ring-blue-100 focus:border-blue-500 outline-none transition-all">
                </div>
                
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Admin Email</label>
                    <input type="email" name="email" required placeholder="admin@family.com"
                           class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-4 focus:ring-blue-100 focus:border-blue-500 outline-none transition-all">
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Secure Password</label>
                    <input type="password" name="password" required 
                           class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-4 focus:ring-blue-100 focus:border-blue-500 outline-none transition-all">
                    <p class="mt-2 text-xs text-gray-400">This account will have full control over user approvals and site content.</p>
                </div>
            </div>

            <button type="submit" class="w-full bg-gray-900 text-white py-4 rounded-xl font-bold hover:bg-black transform active:scale-[0.98] transition-all shadow-lg">
                Finalize Setup & Login
            </button>
        </form>
    </div>
</div>
{% endblock %}
